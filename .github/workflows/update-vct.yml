name: Auto-Update vCluster Templates + K8s Versions

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Create PR branch
        id: prepare_branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          BRANCH_NAME="auto/update-templates-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Run update script
        run: bash scripts/update-templates.sh

      - name: Commit and push changes
        id: commit_push_changes
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "skip_pr=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "Auto-update vCluster Templates Kubernetes version parameters"
          git push origin "${{ steps.prepare_branch.outputs.branch_name }}"
          echo "branch_name=${{ steps.prepare_branch.outputs.branch_name }}" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.commit_push_changes.outputs.skip_pr != 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: ${{ steps.commit_push_changes.outputs.branch_name }}
          title: "Auto-update vCluster Templates Kubernetes version parameters"
          body: |
            This PR was automatically generated to update Kubernetes version options in vCluster Templates.