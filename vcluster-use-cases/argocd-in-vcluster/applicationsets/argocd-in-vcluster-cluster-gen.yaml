apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argocd-in-vc-instance-appset
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            addons.vcluster.demo/argocd: "true"
  template:
    metadata:
      name: 'argocd-{{.name}}'
    spec:
      destination:
        namespace: argocd
        server: '{{.server}}'
      project: 'argocd-in-vcluster'
      source:
        chart: argo-cd
        repoURL: ghcr.io/argoproj/argo-helm
        targetRevision: 9.4.10
        helm:
          releaseName: argocd
          valuesObject:
            global:
              domain: '{{ index .metadata.labels "vcluster.demo/argocd-hostname" }}'
            configs:
              cm:
                url: 'https://{{ index .metadata.labels "vcluster.demo/argocd-hostname" }}'
              params:
                server.insecure: "true"
            server:
              ingress:
                enabled: true
                annotations:
                  nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
                  nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
                ingressClassName: "nginx"
                hostname: '{{ index .metadata.labels "vcluster.demo/argocd-hostname" }}'
                tls: true
              ingressGrpc:
                enabled: false
      syncPolicy:
        automated:
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
