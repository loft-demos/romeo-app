apiVersion: management.loft.sh/v1
kind: VirtualClusterTemplate
metadata:
  name: dummy-name-to-be-overridden
spec:
  template:
    helmRelease:
      chart:
        version: 0.25.0
  parameters:
    - variable: sleepAfter
      label: Sleep After Inactivity (minutes)
      type: number
      options:
        - '30'
        - '45'
        - '60'
        - '120'
      defaultValue: '45'
    - variable: k8sVersion
      label: k8sVersion
      description: Please select Kubernetes version
      options:
        - v1.33.1
        - v1.32.5
        - v1.31.1
        - v1.30.4
      defaultValue: v1.32.5
